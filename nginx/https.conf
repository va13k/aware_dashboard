# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection           "1; mode=block"                       always;

    # Internal subrequest used by auth_request — not reachable externally
    location = /auth/validate {
        internal;
        set $auth_validate_upstream http://dashboard-api:8000;
        proxy_pass $auth_validate_upstream/auth/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
    }

    # Login / logout pages — no auth required
    location /auth/ {
        set $auth_upstream http://dashboard-api:8000;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect to login, preserving the originally requested URL
    location @require_login {
        return 302 /auth/login?next=$request_uri;
    }

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /setup-launch/ {
        root /usr/share/nginx/html;
        try_files /setup-loading.html =404;
    }

    # Configurator static assets (JS/CSS bundles)
    location /configurator/static/ {
        auth_request /auth/validate;
        error_page 401 = @require_login;
        alias /usr/share/nginx/html/configurator_static/;
        expires 1y;
        add_header Cache-Control              "public, immutable";
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header X-Frame-Options            "SAMEORIGIN"                          always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header X-XSS-Protection           "1; mode=block"                       always;
    }

    # Configurator public root files (manifest.json, favicon.ico, etc.)
    location ~* ^/configurator/([^/]+\.[^/]+)$ {
        auth_request /auth/validate;
        error_page 401 = @require_login;
        alias /usr/share/nginx/html/configurator_static/$1;
    }

    # AWARE Configurator (Django + React)
    location /configurator/ {
        auth_request /auth/validate;
        error_page 401 = @require_login;
        set $configurator_upstream http://configurator:8000;
        rewrite ^/configurator/(.*)$ /$1 break;
        proxy_pass $configurator_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server cached assets (QR code image, sensor icons)
    location /cache/ {
        set $micro_server_cache_upstream http://micro-server:8080;
        proxy_pass $micro_server_cache_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server QR code study join landing page /:studyNumber/:studyKey
    location ~ ^/\d+/\w+$ {
        set $micro_server_upstream http://micro-server:8080;
        proxy_pass $micro_server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server upload and study config endpoint used by AWARE mobile clients
    location /index.php/ {
        set $micro_server_php_upstream http://micro-server:8080;
        proxy_pass $micro_server_php_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /studies/files/ {
        alias /usr/share/nginx/html/studies/;
        autoindex on;
    }

    # Studies landing page and direct study file access
    location /studies/ {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Analytics API
    location /api/ {
        auth_request /auth/validate;
        error_page 401 = @require_login;
        set $dashboard_api_upstream http://dashboard-api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $dashboard_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard frontend (React SPA)
    location /dashboard/ {
        auth_request /auth/validate;
        error_page 401 = @require_login;
        set $dashboard_upstream http://dashboard:80;
        proxy_pass $dashboard_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
