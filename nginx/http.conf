upstream configurator {
    server configurator:8000;
}

upstream micro_server {
    server micro-server:8080;
}

server {
    listen 80;
    server_name _;

    # Configurator static assets (JS/CSS bundles)
    location /configurator/static/ {
        alias /usr/share/nginx/html/configurator_static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configurator public root files (manifest.json, favicon.ico, etc.)
    location ~* ^/configurator/([^/]+\.[^/]+)$ {
        alias /usr/share/nginx/html/configurator_static/$1;
    }

    # AWARE Configurator (Django + React)
    location /configurator/ {
        proxy_pass http://configurator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server — cached assets (QR code image, sensor icons)
    location /cache/ {
        proxy_pass http://micro_server/cache/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server — QR code study join landing page /:studyNumber/:studyKey
    location ~ ^/\d+/\w+$ {
        proxy_pass http://micro_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server — data upload and study config endpoint used by AWARE mobile clients
    location /index.php/ {
        proxy_pass http://micro_server/index.php/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AWARE Micro Server — browser-friendly public path
    location /micro-server/ {
        proxy_pass http://micro_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static JSON study files
    location /studies/ {
        alias /usr/share/nginx/html/studies/;
        autoindex on;
    }
}
