<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening Setup Wizard</title>
    <style>
      :root {
        --bg: #f3efe6;
        --surface: rgba(255, 253, 248, 0.92);
        --border: rgba(48, 67, 54, 0.14);
        --text: #193229;
        --muted: #5f746b;
        --accent: rgb(31, 179, 223);
        --shadow: 0 20px 60px rgba(25, 50, 41, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(31, 179, 223, 0.2),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(182, 140, 76, 0.18),
            transparent 30%
          ),
          linear-gradient(160deg, #f7f3ea 0%, #efe7da 100%);
      }

      .card {
        width: min(520px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 0.96;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 1rem;
      }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(24, 48, 40, 0.05);
        border: 1px solid var(--border);
      }

      .spinner {
        width: 40px;
        height: 40px;
        margin: 24px 0 18px;
        border-radius: 50%;
        border: 4px solid rgba(31, 179, 223, 0.16);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        color: white;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          rgb(23, 145, 185) 100%
        );
      }

      .button-secondary {
        color: var(--text);
        background: white;
        border: 1px solid var(--border);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">AWARE Dashboard</p>
      <h1>Opening setup wizard</h1>
      <p>
        This page waits for the setup wizard on port <code>9999</code> and
        redirects as soon as it responds.
      </p>
      <div class="spinner" aria-hidden="true"></div>
      <div class="status" id="status">
        Checking <code id="target-url"></code>...
      </div>
      <div class="actions">
        <a class="button button-primary" id="open-setup" href="#"
          >Open setup wizard</a
        >
        <a class="button button-secondary" href="/">Back to main page</a>
      </div>
    </main>

    <script>
      (function () {
        var host = window.location.hostname || "localhost";
        var target = "http://" + host + ":9999/";
        var status = document.getElementById("status");
        var targetUrl = document.getElementById("target-url");
        var openSetup = document.getElementById("open-setup");
        var attempts = 0;

        targetUrl.textContent = target;
        openSetup.href = target;

        function checkSetup() {
          attempts += 1;
          fetch(target, { method: "GET", mode: "no-cors", cache: "no-store" })
            .then(function () {
              status.textContent = "Setup wizard is ready. Redirecting...";
              window.location.replace(target);
            })
            .catch(function () {
              if (attempts >= 20) {
                status.textContent =
                  "Setup wizard is unavailable. Start it with ./setup.sh or docker compose --profile setup up -d setup-wizard, then retry.";
              } else {
                status.textContent =
                  "Waiting for the setup wizard on port 9999...";
              }
              window.setTimeout(checkSetup, 1200);
            });
        }

        checkSetup();
      })();
    </script>
  </body>
</html>
