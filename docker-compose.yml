services:
  setup-wizard:
    build: ./setup
    container_name: aware_setup
    profiles: ["setup"]
    ports:
      - "9999:9999"
    volumes:
      - .:/project
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mysql:
    image: mysql:8.0
    container_name: aware_mysql
    restart: unless-stopped
    command: --init-file=/etc/mysql/init_all.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
      - ./db/init_all.sql:/etc/mysql/init_all.sql:ro
    networks:
      - aware_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -u aware_analytics -panalyticspass aware_android -e 'SELECT 1' 2>/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s

  micro-server:
    build: ./aware-micro-server
    container_name: aware_micro
    restart: unless-stopped
    develop:
      watch:
        - path: ./aware-micro-server/aware-config.json
          action: restart
    volumes:
      - ./aware-micro-server/aware-config.json:/app/aware-config.json:ro
    expose:
      - "8080"
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  configurator:
    build:
      context: ./AWARE-Configurator
      args:
        SERVER_PROTOCOL: ${PROTOCOL:-http}
        SERVER_IP: ${PUBLIC_HOST:-localhost}
        SERVER_PORT: "${PUBLIC_PORT:-80}"
        SERVER_BASE_PATH: /configurator
    container_name: aware_configurator
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      PUBLIC_PORT: ${PUBLIC_PORT:-80}
      PROTOCOL: ${PROTOCOL:-http}
      DJANGO_ALLOWED_HOSTS: "*"
    volumes:
      - .:/project
      - configurator_static:/app/staticfiles
      - ./studies:/app/saved_json_files
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/")''',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: aware_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/backup.html:/usr/share/nginx/html/backup.html:ro
      - ./nginx/configurator-loading.html:/usr/share/nginx/html/configurator-loading.html:ro
      - ./nginx/setup-loading.html:/usr/share/nginx/html/setup-loading.html:ro
      - ./nginx/${PROTOCOL:-http}.conf:/etc/nginx/conf.d/default.conf:ro
      - ./studies:/usr/share/nginx/html/studies:ro
      - ./aware-micro-server/esm:/usr/share/nginx/html/esm:ro
      - configurator_static:/usr/share/nginx/html/configurator_static:ro
      - ${SSL_CERTIFICATE_PATH:-/dev/null}:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERTIFICATE_KEY_PATH:-/dev/null}:/etc/nginx/certs/privkey.pem:ro
    networks:
      - aware_network
    depends_on:
      configurator:
        condition: service_healthy
      micro-server:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      dashboard-api:
        condition: service_healthy

  dashboard-api:
    build: ./analytics_api
    container_name: aware_dashboard_api
    restart: unless-stopped
    environment:
      ANDROID_DATABASE_URL: mysql+aiomysql://aware_analytics:analyticspass@mysql:3306/aware_android
      IOS_DATABASE_URL: mysql+aiomysql://aware_analytics:analyticspass@mysql:3306/aware_ios
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
      RESEARCHER_USERNAME: ${RESEARCHER_USERNAME:-}
      RESEARCHER_PASSWORD: ${RESEARCHER_PASSWORD:-}
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aware_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/health")''',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  dashboard:
    build: ./dashboard
    container_name: aware_dashboard
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - aware_network
    depends_on:
      - dashboard-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1/dashboard/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  aware_network:
    driver: bridge

volumes:
  mysql_data:
  configurator_static:
