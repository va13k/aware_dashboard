services:
  setup-wizard:
    build: ./setup
    container_name: aware_setup
    profiles: ["setup"]
    ports:
      - "9999:9999"
    environment:
      HOST_PROJECT_DIR: ${PWD}
    volumes:
      - ${PWD}:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock

  mysql:
    image: mysql:8.0
    container_name: aware_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - aware_network
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  micro-server:
    build: ./aware-micro-server
    container_name: aware_micro
    restart: unless-stopped
    volumes:
      - ./aware-micro-server/aware-config.json:/app/aware-config.json
      - ./aware-micro-server/cache:/app/cache
    expose:
      - "8080"
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy

  configurator:
    build:
      context: ./AWARE-Configurator
      args:
        SERVER_PROTOCOL: http
        SERVER_IP: localhost
        SERVER_PORT: "80"
        SERVER_BASE_PATH: /configurator
    container_name: aware_configurator
    restart: unless-stopped
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
    volumes:
      - configurator_static:/app/staticfiles
      - ./studies:/app/saved_json_files
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: aware_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/${PROTOCOL:-http}.conf:/etc/nginx/conf.d/default.conf:ro
      - ./studies:/usr/share/nginx/html/studies:ro
      - configurator_static:/usr/share/nginx/html/configurator_static:ro
      - ${SSL_CERTIFICATE_PATH:-/dev/null}:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERTIFICATE_KEY_PATH:-/dev/null}:/etc/nginx/certs/privkey.pem:ro
    networks:
      - aware_network
    depends_on:
      - configurator
      - micro-server

networks:
  aware_network:
    driver: bridge

volumes:
  mysql_data:
  configurator_static:
