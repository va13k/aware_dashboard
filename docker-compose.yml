services:
  setup-wizard:
    build: ./setup
    container_name: aware_setup
    profiles: ["setup"]
    ports:
      - "9999:9999"
    volumes:
      - .:/project

  mysql:
    image: mysql:8.0
    container_name: aware_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - aware_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  micro-server:
    build: ./aware-micro-server
    container_name: aware_micro
    restart: unless-stopped
    develop:
      watch:
        - path: ./aware-micro-server/aware-config.json
          action: restart
    volumes:
      - ./aware-micro-server/aware-config.json:/app/aware-config.json:ro
    expose:
      - "8080"
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy

  configurator:
    build:
      context: ./AWARE-Configurator
      args:
        SERVER_PROTOCOL: ${PROTOCOL:-http}
        SERVER_IP: ${PUBLIC_HOST:-localhost}
        SERVER_PORT: "${PUBLIC_PORT:-80}"
        SERVER_BASE_PATH: /configurator
    container_name: aware_configurator
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      PUBLIC_PORT: ${PUBLIC_PORT:-80}
      PROTOCOL: ${PROTOCOL:-http}
      DJANGO_ALLOWED_HOSTS: "*"
    volumes:
      - .:/project
      - configurator_static:/app/staticfiles
      - ./studies:/app/saved_json_files
    networks:
      - aware_network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: aware_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/configurator-loading.html:/usr/share/nginx/html/configurator-loading.html:ro
      - ./nginx/setup-loading.html:/usr/share/nginx/html/setup-loading.html:ro
      - ./nginx/${PROTOCOL:-http}.conf:/etc/nginx/conf.d/default.conf:ro
      - ./studies:/usr/share/nginx/html/studies:ro
      - ./aware-micro-server/esm:/usr/share/nginx/html/esm:ro
      - ./aware-micro-server/esm:/usr/share/nginx/html/esm:ro
      - configurator_static:/usr/share/nginx/html/configurator_static:ro
      - ${SSL_CERTIFICATE_PATH:-/dev/null}:/etc/nginx/certs/fullchain.pem:ro
      - ${SSL_CERTIFICATE_KEY_PATH:-/dev/null}:/etc/nginx/certs/privkey.pem:ro
    networks:
      - aware_network
    depends_on:
      configurator:
        condition: service_started
      micro-server:
        condition: service_started
      dashboard:
        condition: service_started
      dashboard-api:
        condition: service_started

  dashboard-api:
    build: ./analytics_api
    container_name: aware_dashboard_api
    restart: unless-stopped
    environment:
      ANDROID_DATABASE_URL: mysql+aiomysql://aware_analytics:analyticspass@mysql:3306/aware_android
      IOS_DATABASE_URL: mysql+aiomysql://aware_analytics:analyticspass@mysql:3306/aware_ios
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY}
      RESEARCHER_USERNAME: ${RESEARCHER_USERNAME:-}
      RESEARCHER_PASSWORD: ${RESEARCHER_PASSWORD:-}
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aware_network

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_KEY: ${ANALYTICS_API_KEY}
    container_name: aware_dashboard
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - aware_network
    depends_on:
      - dashboard-api

networks:
  aware_network:
    driver: bridge

volumes:
  mysql_data:
  configurator_static:
